name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Secret scan
        run: |
          if grep -rn -E '(api_key|apikey|password|secret|token|private_key)\s*[:=]\s*["\x27][^"\x27]{8,}' \
            --include='*.html' --include='*.js' . 2>/dev/null; then
            echo 'WARNING: Potential secrets found!'
          else
            echo 'Clean.'
          fi

      - name: Semgrep
        run: |
          pip install semgrep 2>/dev/null || true
          semgrep scan --config auto --json --output semgrep.json . || true
        continue-on-error: true

      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-reports
          path: semgrep.json
          retention-days: 14

  pr-comment:
    name: Post PR Summary
    runs-on: ubuntu-latest
    needs: [validate]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## CI: ' + (${{ needs.validate.result == 'success' }} ? ':white_check_mark: Pass' : ':x: Check artifacts') + '\n\n_ZeroShadowOps CI_'
            });
